name: Prettier Formatting
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - run:
          name: Install NPM dependencies
          command: |
            npm ci
      - run:
          name: "Run Prettier with project configuration"
          command: |
            npx prettier --check .
