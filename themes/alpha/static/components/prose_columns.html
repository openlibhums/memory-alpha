{# A minimal component set for creating columns in prose while
preserving responsiveness and flow spacing #}

{% macro column() %}
  <div class="prose flow flow-first-child">{{ caller() }}</div>
{% endmacro %}

{% macro prose_columns() -%}
  <div
    class="
      not-prose flex row-gap-0 column-gap-6
      direction-row-large direction-column-small
    "
  >
    {{ caller() }}
  </div>
{% endmacro %}
