{% macro tick_list_item() %}
  <li>
    <div class="tick-item">
      {% include "svg/tick-icon.svg" %}
      {{ caller() }}
    </div>
  </li>
{% endmacro %}

{% macro tick_list(max_columns=3) %}
  <div class="tick-list flow max-columns-{{ max_columns }} not-prose">
    <ul class="flow">
      {{ caller() }}
    </ul>
  </div>
{% endmacro %}
